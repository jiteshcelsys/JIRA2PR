<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>ToDo - App by Jitesh Pandey</title>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<link href="img/apple-touch-icon.png" rel="apple-touch-icon" />
		<link href="img/apple-touch-icon-152x152.png" rel="apple-touch-icon" sizes="152x152" />
		<link href="img/apple-touch-icon-167x167.png" rel="apple-touch-icon" sizes="167x167" />
		<link href="img/apple-touch-icon-180x180.png" rel="apple-touch-icon" sizes="180x180" />
		<link href="img/icon-hires.png" rel="icon" sizes="192x192" />
		<link href="img/icon-normal.png" rel="icon" sizes="128x128" />
		<link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/6.0.0/normalize.min.css" rel="stylesheet">
		<link href="https://fonts.googleapis.com/css?family=Roboto:400,700" rel="stylesheet">
		<link href="style.css" rel="stylesheet">
	</head>
	<body>
		<div class="history-container">
			<button id="history-btn">HISTORY</button>
			<div id="history-popup" class="history-popup hidden">
				<h4>Completed Tasks (Last 2 Days)</h4>
				<ul id="history-list"></ul>
			</div>
		</div>

		<div class="wrapper">

			<div class="app">

				<input type="text" id="task" placeholder="Add Your Task Here" class="task">

				<div class="lists">
					<section class="favs">
						<h3></h3>
						<ul></ul>
					</section>

					<section class="tasks">
						<h3></h3>
						<ul></ul>
					</section>

					<section class="done">
						<h3></h3>
						<ul></ul>
					</section>
				</div>

			</div>

			<footer>
				<p>&copy;2026 Ticket2PR. All Rights Reserved</p>
			</footer>

		</div>
		<div id="task-toast" class="task-toast hidden">A Task has been Added</div>
		<script src="buttons.js"></script>
		<script src="app.js"></script>
	</body>
</html>
